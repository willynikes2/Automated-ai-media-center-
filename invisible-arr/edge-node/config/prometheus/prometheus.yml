global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "agent-api"
    static_configs:
      - targets: ["agent-api:8880"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "agent-worker"
    static_configs:
      - targets: ["agent-worker:9090"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "agent-qc"
    static_configs:
      - targets: ["agent-qc:9091"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "agent-storage"
    static_configs:
      - targets: ["agent-storage:9092"]
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: "iptv-gateway"
    static_configs:
      - targets: ["iptv-gateway:8881"]
    metrics_path: /metrics
    scrape_interval: 15s
