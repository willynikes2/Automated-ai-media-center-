apiVersion: 1

contactPoints:
  - orgId: 1
    name: default
    receivers:
      - uid: grafana-default-email
        type: email
        settings:
          addresses: "admin@cutdacord.com"
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: default
    group_by: ['alertname', 'job']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
