services:
  # ═══════════════════════════════════════
  # USER-FACING
  # ═══════════════════════════════════════

  socket-proxy:
    image: nginx:1-alpine
    container_name: socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal

  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    depends_on:
      - socket-proxy
    command:
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--api=false"
      - "--api.dashboard=false"
      - "--log.level=WARN"
      # Security plugins
      - "--experimental.plugins.fail2ban.modulename=github.com/tomMoulard/fail2ban"
      - "--experimental.plugins.fail2ban.version=v0.8.3"
      - "--experimental.plugins.real-ip.modulename=github.com/soulbalz/traefik-real-ip"
      - "--experimental.plugins.real-ip.version=v1.0.3"
      # Dynamic file provider for middleware configs
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CONFIG_PATH:-./config}/traefik:/etc/traefik
    networks:
      - internal

  jellyfin:
    build:
      context: ./services/jellyfin
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${CONFIG_PATH:-./config}/jellyfin:/config
      - ${MEDIA_PATH:-./data/media}:/data/media
      - ${DATA_PATH:-./data}/zurg:/data/zurg:ro,slave
      - ${RECORDINGS_PATH:-./data/recordings}:/data/recordings
    ports:
      - "127.0.0.1:${JELLYFIN_PORT:-8096}:8096"
    labels:
      - "traefik.enable=${DOMAIN:+true}"
      - "traefik.http.routers.jellyfin.rule=Host(`media.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    # Uncomment for GPU transcoding:
    # devices:
    #   - /dev/dri:/dev/dri
    networks:
      - internal

  frontend:
    build:
      context: ./services/frontend
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    container_name: automedia-frontend
    restart: unless-stopped
    depends_on:
      - agent-api
      - jellyfin
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:80"
    labels:
      - "traefik.enable=${DOMAIN:+true}"
      - "traefik.http.routers.frontend.rule=Host(`app.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - internal

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${CONFIG_PATH:-./config}/seerr:/app/config
    ports:
      - "127.0.0.1:${SEERR_PORT:-5055}:5055"
    depends_on:
      - jellyfin
    # Seerr kept for reference only — localhost debug access, no public routing
    networks:
      - internal

  landing:
    build:
      context: ./services/landing
    container_name: cutdacord-landing
    restart: unless-stopped
    labels:
      - "traefik.enable=${DOMAIN:+true}"
      - "traefik.http.routers.landing.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.landing.entrypoints=websecure"
      - "traefik.http.routers.landing.tls.certresolver=letsencrypt"
      - "traefik.http.services.landing.loadbalancer.server.port=80"
    networks:
      - internal

  # ═══════════════════════════════════════
  # HIDDEN PLUMBING (never exposed)
  # ═══════════════════════════════════════

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${CONFIG_PATH:-./config}/sonarr:/config
      - ${DATA_PATH:-./data}:/data
      - ${DATA_PATH:-./data}/zurg:/data/zurg:ro,slave
    networks:
      - internal

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${CONFIG_PATH:-./config}/radarr:/config
      - ${DATA_PATH:-./data}:/data
      - ${DATA_PATH:-./data}/zurg:/data/zurg:ro,slave
    networks:
      - internal

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${CONFIG_PATH:-./config}/prowlarr:/config
    networks:
      - internal

  # ═══════════════════════════════════════
  # DOWNLOAD CLIENTS
  # ═══════════════════════════════════════

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 1.0.0.1
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_PATH:-./config}/qbittorrent:/config
      - ${DATA_PATH:-./data}/torrents:/data/torrents
    ports:
      - "127.0.0.1:${QBITTORRENT_PORT:-8080}:8080"
    networks:
      - internal

  rdt-client:
    image: rogerfar/rdtclient:latest
    container_name: rdt-client
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - AGENT_API_URL=http://agent-api:8880
      - RDT_WEBHOOK_TOKEN=${RDT_WEBHOOK_TOKEN:-}
    volumes:
      - ${CONFIG_PATH:-./config}/rdtclient:/data/db
      - ${DATA_PATH:-./data}:/data
      - ./scripts:/scripts:ro
    networks:
      - internal

  zurg:
    image: ghcr.io/debridmediamanager/zurg-testing:v0.9.3-final
    container_name: zurg
    restart: unless-stopped
    volumes:
      - ${CONFIG_PATH:-./config}/zurg/config.yml:/app/config.yml
      - zurgdata:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/dav/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  rclone:
    image: rclone/rclone:latest
    container_name: rclone
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ${DATA_PATH:-./data}/zurg:/data:shared
      - ${CONFIG_PATH:-./config}/rclone/rclone.conf:/config/rclone/rclone.conf
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse:/dev/fuse:rwm
    depends_on:
      zurg:
        condition: service_healthy
    command: "mount zurg: /data --allow-other --allow-non-empty --dir-cache-time 10s --vfs-cache-mode full"
    networks:
      - internal

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      - TZ=${TZ:-America/New_York}
      - CRON_SCHEDULE=@daily
    volumes:
      - ${CONFIG_PATH:-./config}/recyclarr:/config
    networks:
      - internal

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${CONFIG_PATH:-./config}/sabnzbd:/config
      - ${DATA_PATH:-./data}/usenet:/data/usenet
    ports:
      - "127.0.0.1:${SABNZBD_PORT:-8081}:8080"
    profiles:
      - usenet
    networks:
      - internal

  # ═══════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-invisiblearr}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-invisiblearr}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invisiblearr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - internal

  # ═══════════════════════════════════════
  # OBSERVABILITY
  # ═══════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=2GB"
    volumes:
      - ./config/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    mem_limit: 128m
    networks:
      - internal

  loki:
    image: grafana/loki:3.3.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./config/loki:/etc/loki:ro
      - loki_data:/loki
    mem_limit: 192m
    networks:
      - internal

  promtail:
    image: grafana/promtail:3.3.0
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./config/promtail:/etc/promtail:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    mem_limit: 64m
    depends_on:
      - loki
    networks:
      - internal

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=https://status.${DOMAIN:-localhost}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=${GMAIL_ADDRESS}
      - GF_SMTP_PASSWORD=${GMAIL_APP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GMAIL_ADDRESS}
      - GF_SMTP_FROM_NAME=CutDaCord Alerts
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    mem_limit: 128m
    labels:
      - "traefik.enable=${DOMAIN:+true}"
      - "traefik.http.routers.grafana.rule=Host(`status.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - internal

  # ═══════════════════════════════════════
  # AGENT LAYER
  # ═══════════════════════════════════════

  agent-api:
    build:
      context: ./services/agent-api
    container_name: agent-api
    restart: unless-stopped
    volumes:
      - ./services/shared:/app/shared:ro
      - ${MEDIA_PATH:-./data/media}:/data/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-invisiblearr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-invisiblearr}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - RD_API_TOKEN=${RD_API_TOKEN:-}
      - RD_ENABLED=${RD_ENABLED:-false}
      - RDT_WEBHOOK_TOKEN=${RDT_WEBHOOK_TOKEN:-}
      - PROWLARR_URL=http://prowlarr:9696
      - PROWLARR_API_KEY=${PROWLARR_API_KEY:-}
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY:-}
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-none}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - DEFAULT_MAX_RESOLUTION=${DEFAULT_MAX_RESOLUTION:-1080}
      - DEFAULT_ALLOW_4K=${DEFAULT_ALLOW_4K:-false}
      - DEFAULT_MAX_MOVIE_SIZE_GB=${DEFAULT_MAX_MOVIE_SIZE_GB:-15}
      - DEFAULT_MAX_EPISODE_SIZE_GB=${DEFAULT_MAX_EPISODE_SIZE_GB:-4}
      - MEDIA_PATH=/data/media
      - DOWNLOADS_PATH=/data/downloads
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - JELLYFIN_ADMIN_TOKEN=${JELLYFIN_ADMIN_TOKEN:-}
      - JELLYFIN_URL=http://jellyfin:8096
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-}
      - SENTRY_DSN_BACKEND=${SENTRY_DSN_BACKEND:-}
      - ENV=${ENV:-dev}
    ports:
      - "127.0.0.1:${AGENT_API_PORT:-8880}:8880"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8880/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=${DOMAIN:+true}"
      - "traefik.http.routers.agent-api.rule=Host(`api.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.agent-api.entrypoints=websecure"
      - "traefik.http.routers.agent-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.agent-api.middlewares=api-cors"
      - "traefik.http.services.agent-api.loadbalancer.server.port=8880"
      # CORS middleware for frontend cross-origin requests
      - "traefik.http.middlewares.api-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.api-cors.headers.accesscontrolallowheaders=Content-Type,X-Api-Key,Authorization"
      - "traefik.http.middlewares.api-cors.headers.accesscontrolalloworiginlist=https://app.${DOMAIN:-localhost},https://media.${DOMAIN:-localhost}"
      - "traefik.http.middlewares.api-cors.headers.accesscontrolmaxage=3600"
    networks:
      - internal

  agent-worker:
    build:
      context: ./services/agent-worker
    container_name: agent-worker
    restart: unless-stopped
    volumes:
      - ./services/shared:/app/shared:ro
      - ${DATA_PATH:-./data}:/data:shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent-api:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-invisiblearr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-invisiblearr}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - RD_API_TOKEN=${RD_API_TOKEN:-}
      - RD_ENABLED=${RD_ENABLED:-false}
      - ZURG_ENABLED=${ZURG_ENABLED:-false}
      - ZURG_MOUNT_PATH=${ZURG_MOUNT_PATH:-/data/zurg/__all__}
      - ZURG_BASE_URL=${ZURG_BASE_URL:-}
      - TORRENT_ENABLED=${TORRENT_ENABLED:-true}
      - USENET_ENABLED=${USENET_ENABLED:-false}
      - SABNZBD_URL=http://sabnzbd:8080
      - SABNZBD_API_KEY=${SABNZBD_API_KEY:-}
      - QBT_URL=http://qbittorrent:8080
      - QBT_USERNAME=admin
      - QBT_PASSWORD=${QBT_PASSWORD:-}
      - PROWLARR_URL=http://prowlarr:9696
      - PROWLARR_API_KEY=${PROWLARR_API_KEY:-}
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY:-}
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-none}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - DEFAULT_MAX_RESOLUTION=${DEFAULT_MAX_RESOLUTION:-1080}
      - DEFAULT_ALLOW_4K=${DEFAULT_ALLOW_4K:-false}
      - DEFAULT_MAX_MOVIE_SIZE_GB=${DEFAULT_MAX_MOVIE_SIZE_GB:-15}
      - DEFAULT_MAX_EPISODE_SIZE_GB=${DEFAULT_MAX_EPISODE_SIZE_GB:-4}
      - MEDIA_PATH=/data/media
      - DOWNLOADS_PATH=/data/downloads
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - JELLYFIN_URL=http://jellyfin:8096
      - JELLYFIN_ADMIN_TOKEN=${JELLYFIN_ADMIN_TOKEN:-}
      - SENTRY_DSN_BACKEND=${SENTRY_DSN_BACKEND:-}
      - ENV=${ENV:-dev}
    networks:
      - internal

  agent-qc:
    build:
      context: ./services/agent-qc
    container_name: agent-qc
    restart: unless-stopped
    volumes:
      - ./services/shared:/app/shared:ro
      - ${DATA_PATH:-./data}:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-invisiblearr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-invisiblearr}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MEDIA_PATH=/data/media
      - DOWNLOADS_PATH=/data/downloads
      - JELLYFIN_ADMIN_TOKEN=${JELLYFIN_ADMIN_TOKEN:-}
      - SENTRY_DSN_BACKEND=${SENTRY_DSN_BACKEND:-}
      - ENV=${ENV:-dev}
    networks:
      - internal

  agent-storage:
    build:
      context: ./services/agent-storage
    container_name: agent-storage
    restart: unless-stopped
    volumes:
      - ./services/shared:/app/shared:ro
      - ${MEDIA_PATH:-./data/media}:/data/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-invisiblearr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-invisiblearr}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MEDIA_PATH=/data/media
      - JELLYFIN_URL=http://jellyfin:8096
      - SENTRY_DSN_BACKEND=${SENTRY_DSN_BACKEND:-}
      - ENV=${ENV:-dev}
    networks:
      - internal

  iptv-gateway:
    build:
      context: ./services/iptv-gateway
    container_name: iptv-gateway
    restart: unless-stopped
    volumes:
      - ./services/shared:/app/shared:ro
      - ${CONFIG_PATH:-./config}/iptv:/data/iptv:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-invisiblearr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-invisiblearr}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SENTRY_DSN_BACKEND=${SENTRY_DSN_BACKEND:-}
      - ENV=${ENV:-dev}
    ports:
      - "127.0.0.1:${IPTV_GATEWAY_PORT:-8881}:8881"
    labels:
      - "traefik.enable=${DOMAIN:+true}"
      - "traefik.http.routers.iptv.rule=Host(`iptv.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.iptv.entrypoints=websecure"
      - "traefik.http.routers.iptv.tls.certresolver=letsencrypt"
      - "traefik.http.services.iptv.loadbalancer.server.port=8881"
    profiles:
      - iptv
    networks:
      - internal

  qa-swarm:
    build:
      context: ./services/qa-swarm
    container_name: qa-swarm
    restart: "no"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - API_BASE_URL=http://agent-api:8880
      - FRONTEND_URL=http://automedia-frontend:80
      - IPTV_BASE_URL=http://iptv-gateway:8881
      - PROMETHEUS_URL=http://prometheus:9090
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-}
      - ADMIN_API_KEY=${QA_ADMIN_API_KEY:-}
    mem_limit: 512m
    cpus: 1.0
    volumes:
      - ./services/shared:/app/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      agent-api:
        condition: service_healthy
    networks:
