user root;
worker_processes 1;
error_log /dev/stderr warn;

events {
    worker_connections 32;
}

http {
    access_log off;

    upstream docker {
        server unix:/var/run/docker.sock fail_timeout=0;
    }

    server {
        listen 2375;

        # Strip Docker API version prefix from URL.
        # Traefik's internal Docker client sends /v1.24/... which Docker 26+
        # rejects (minimum is now 1.44). Stripping the version lets Docker
        # handle the request using its native latest API version.
        location ~ "^/v[0-9]+\.[0-9]+/(.*)" {
            proxy_pass          http://docker/$1$is_args$args;
            proxy_http_version  1.1;
            proxy_set_header    Host             docker.sock;
            proxy_set_header    Connection       "";
            proxy_read_timeout  3600;
            proxy_buffering     off;
        }

        # Pass unversioned requests through unchanged.
        location / {
            proxy_pass          http://docker;
            proxy_http_version  1.1;
            proxy_set_header    Host             docker.sock;
            proxy_set_header    Connection       "";
            proxy_read_timeout  3600;
            proxy_buffering     off;
        }
    }
}
