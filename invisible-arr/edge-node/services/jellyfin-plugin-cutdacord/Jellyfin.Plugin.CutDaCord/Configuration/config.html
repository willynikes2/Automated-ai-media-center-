<!DOCTYPE html>
<html>
<head>
    <title>CutDaCord</title>
</head>
<body>
    <div id="CutDaCordConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
         data-require="emby-input,emby-button">

        <div data-role="content">
            <div class="content-primary">
                <h2>CutDaCord Settings</h2>
                <form id="CutDaCordConfigForm">
                    <div class="inputContainer">
                        <label class="inputLabel" for="txtApiBaseUrl">API Base URL</label>
                        <input id="txtApiBaseUrl" name="txtApiBaseUrl" type="text" is="emby-input"
                               placeholder="https://api.cutdacord.app" />
                        <div class="fieldDescription">
                            The base URL for the CutDaCord API endpoint.
                        </div>
                    </div>
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script type="text/javascript">
            var CutDaCordPluginId = 'a1b2c3d4-e5f6-7890-abcd-ef1234567890';

            document.querySelector('#CutDaCordConfigPage')
                .addEventListener('pageshow', function () {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(CutDaCordPluginId).then(function (config) {
                        document.querySelector('#txtApiBaseUrl').value = config.ApiBaseUrl || '';
                        Dashboard.hideLoadingMsg();
                    });
                });

            document.querySelector('#CutDaCordConfigForm')
                .addEventListener('submit', function (e) {
                    e.preventDefault();
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(CutDaCordPluginId).then(function (config) {
                        config.ApiBaseUrl = document.querySelector('#txtApiBaseUrl').value;
                        ApiClient.updatePluginConfiguration(CutDaCordPluginId, config).then(function () {
                            Dashboard.processPluginConfigurationUpdateResult();
                        });
                    });
                    return false;
                });
        </script>
    </div>
</body>
</html>
