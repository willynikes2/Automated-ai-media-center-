[alembic]
# Path to migration scripts.
script_location = .

# Template used to generate migration files.
file_template = %%(rev)s_%%(slug)s

# Timezone for migration revision timestamps.
timezone = UTC

# Truncate long revision identifiers.
truncate_slug_length = 40

# Database URL — overridden by env.py from DATABASE_URL env var.
sqlalchemy.url = postgresql+asyncpg://invisiblearr:CHANGE_ME@postgres:5432/invisiblearr

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
