; comskip.ini — tuned for US broadcast TV commercial detection
; Optimized for IPTV recordings (MPEG-TS streams)

[Main Settings]
detect_method=111
verbose=0
max_brightness=60
test_brightness=40
max_avg_brightness=25
max_commercialbreak=600
min_commercialbreak=25
max_commercial_gap=25
min_show_segment=125
non_uniformity=500
added_recording=0
remove_silence=0

[Detailed Settings]
; Silence-based detection
max_silence=100
silence_threshold=20

; Black frame detection
max_volume=500
min_silence=12
noise_level=5

; Scene change detection
min_schange_modifier=0.80
max_schange_modifier=1.20
schange_threshold=0.80

; Logo detection (US broadcast)
logo_at_bottom=0
logo_threshold=0.80
logo_filter=0

; Aspect ratio detection
ar_wrong_modifier=2.00
ar_rounding=0.01

[Output Control]
output_edl=0
output_vdr=0
output_projectx=0
output_zoomplayer=0
output_chapters=1
output_demux=0
output_mkvtoolnix=0
