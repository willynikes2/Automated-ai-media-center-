server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(agent-api|agent-worker|agent-qc|agent-storage|iptv-gateway|automedia-frontend|cutdacord-landing|traefik|jellyfin)"
        action: keep
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            correlation_id: correlation_id
      - labels:
          level:
          service:
