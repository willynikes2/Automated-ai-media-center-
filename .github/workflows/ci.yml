name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: invisible-arr/edge-node

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check services/shared services/agent-api services/agent-worker

      - name: Ruff format check
        run: ruff format --check services/shared services/agent-api services/agent-worker

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: invisible-arr/edge-node/services/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: invisible-arr/edge-node/services/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - agent-api
          - agent-worker
          - agent-qc
          - agent-storage
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t cutdacord-${{ matrix.service }}:ci ./services/${{ matrix.service }}
